type TransferHistoryEntity @entity(immutable: true) {
    # tx hash
    id: ID!
    from: UserEntity!
    to: UserEntity!
    value: BigInt!
    blockNumber: BigInt!
    blockTimestamp: BigInt!
}

type UserEntity @entity {
    id: ID!
    balance: BigInt!
    transactionsFrom: [TransferHistoryEntity!]! @derivedFrom(field: "from")
    transactionsTo: [TransferHistoryEntity!]! @derivedFrom(field: "to")
    history: [UserBalanceHistoryEntity!]! @derivedFrom(field: "user")
}

type UserBalanceHistoryEntity @entity(immutable: true) {
    # user address - tx hash
    id: ID!
    user: UserEntity!
    balance: BigInt!
    blockNumber: BigInt!
    blockTimestamp: BigInt!
    hash: String!
}

type TokenEntity @entity {
    id: ID!
    name: String!
    symbol: String!
    decimals: Int!
    totalSupply: BigInt!
}

type TetuBlockSnapshot @entity {
    id: ID!
    xTetuBal: BigDecimal!
    xTetuBalPower: BigDecimal!
    totalSupply: BigDecimal!
    tetuBalPercent: BigDecimal!
    tetuBalPowerPercent: BigDecimal!
    block: BigInt!
    timestamp: BigInt!
}

type DelegationEntity @entity {
    id: ID!
    delegator: String!
    delegate: String
    delegationId: String!
    updatedAtBlock: BigInt!
    updatedAtTs: BigInt!
}

type UserVotingPowerEntity @entity {
    id: ID!
    ownBalance: BigInt!
    delegatedInBalance: BigInt!
    delegatedOutTo: String
    effectiveVotingPower: BigInt!
    updatedAtBlock: BigInt!
    updatedAtTs: BigInt!
}
